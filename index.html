<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Varshaa Shree — AI/ML Engineer</title>
  <meta name="description" content="Varshaa Shree's portfolio site — AI/ML engineer with expertise in LLM systems and agentic AI." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg: #0b1724;
      --bg2: #071923;
      --text: #f8fafc;
      --muted: rgba(248, 250, 252, 0.72);
      --primary: #2962ff;
      --accent: #34d399;
      --panel: rgba(255, 255, 255, 0.06);
      --panel2: rgba(255, 255, 255, 0.1);
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.6);
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: 'Outfit', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: radial-gradient(circle at 20% 20%, rgba(41, 98, 255, 0.3), transparent 60%),
                  radial-gradient(circle at 80% 60%, rgba(52, 211, 153, 0.2), transparent 70%),
                  linear-gradient(135deg, var(--bg2) 0%, var(--bg) 60%, #0f1f3c 100%);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1.5rem;
    }

    #root {
      width: 100%;
      max-width: 1100px;
    }

    .card {
      position: relative;
      border-radius: 22px;
      border: 1px solid rgba(255, 255, 255, 0.12);
      background: rgba(7, 25, 35, 0.76);
      box-shadow: var(--shadow);
      padding: 2.5rem 2.5rem 3rem;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 25% 30%, rgba(41, 98, 255, 0.3), transparent 55%),
                  radial-gradient(circle at 75% 65%, rgba(52, 211, 153, 0.24), transparent 58%);
      pointer-events: none;
      opacity: 0.8;
    }

    h1 {
      margin: 0 0 0.6rem;
      font-size: clamp(2.6rem, 5vw, 3.8rem);
      letter-spacing: -0.01em;
      line-height: 1.05;
    }

    h1 span {
      display: inline-block;
      color: var(--accent);
    }

    p.lead {
      margin: 0 0 1.8rem;
      max-width: 740px;
      line-height: 1.65;
      color: var(--muted);
      font-size: 1.03rem;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.55rem;
      padding: 0.95rem 1.5rem;
      border-radius: 999px;
      border: none;
      background: linear-gradient(135deg, var(--accent), var(--primary));
      color: var(--bg2);
      font-weight: 700;
      font-size: 0.95rem;
      cursor: pointer;
      box-shadow: 0 18px 35px rgba(0,0,0,0.35);
      transition: transform 0.2s ease, filter 0.2s ease;
      text-decoration: none;
    }

    .btn:hover {
      transform: translateY(-2px);
      filter: brightness(1.05);
    }

    .window {
      position: relative;
      margin-top: 2.3rem;
      border-radius: 20px;
      border: 1px solid rgba(255, 255, 255, 0.14);
      background: rgba(248, 250, 252, 0.08);
      backdrop-filter: blur(18px);
      box-shadow: 0 22px 45px rgba(0,0,0,0.4);
      overflow: hidden;
      transform: translateY(40px) scale(0.98);
      opacity: 0;
      pointer-events: none;
      animation: windowEnter 0.8s 0.4s ease-out forwards;
    }

    .window.open {
      pointer-events: auto;
    }

    @keyframes windowEnter {
      from { opacity: 0; transform: translateY(40px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .window-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.8rem 1.1rem;
      background: rgba(255,255,255,0.12);
      border-bottom: 1px solid rgba(255,255,255,0.14);
    }

    .window-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: rgba(248, 250, 252, 0.9);
      letter-spacing: 0.05em;
    }

    .dots {
      display: flex;
      gap: 0.5rem;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.7);
      opacity: 0.7;
    }

    .window-body {
      padding: 2rem 2.2rem 2.5rem;
      position: relative;
      min-height: 250px;
    }

    .girl {
      position: absolute;
      left: 2.3rem;
      bottom: 0;
      width: 140px;
      height: auto;
      transform: translateY(30px);
      opacity: 0;
      animation: girlPop 0.9s 0.7s ease-out forwards;
    }

    @keyframes girlPop {
      0% { transform: translateY(30px) scale(0.96); opacity: 0; }
      60% { transform: translateY(-8px) scale(1.02); opacity: 1; }
      100% { transform: translateY(0) scale(1); opacity: 1; }
    }

    .speech {
      position: absolute;
      left: 170px;
      bottom: 42px;
      width: calc(100% - 210px);
      max-width: 420px;
      padding: 1.1rem 1.2rem;
      border-radius: 18px;
      background: rgba(248, 250, 252, 0.92);
      color: #0b1724;
      box-shadow: 0 18px 26px rgba(0,0,0,0.2);
      opacity: 0;
      transform: translateY(12px);
      animation: speechFade 0.8s 0.95s ease-out forwards;
    }

    .speech::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 28px;
      border: 10px solid transparent;
      border-top-color: rgba(248, 250, 252, 0.92);
    }

    @keyframes speechFade {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .speech strong {
      display: block;
      font-weight: 800;
      margin-bottom: 0.35rem;
    }

    .speech span {
      display: block;
      margin-top: 0.25rem;
      font-size: 0.95rem;
      color: rgba(15, 23, 42, 0.76);
    }

    .close {
      position: absolute;
      top: 1.1rem;
      right: 1.1rem;
      width: 34px;
      height: 34px;
      border: none;
      border-radius: 50%;
      background: rgba(41, 98, 255, 0.18);
      color: rgba(248, 250, 252, 0.9);
      font-size: 1.1rem;
      cursor: pointer;
      transition: background 0.2s ease;
    }

    .close:hover {
      background: rgba(41, 98, 255, 0.3);
    }

    .footer {
      margin-top: 2.5rem;
      font-size: 0.88rem;
      letter-spacing: 0.02em;
      color: rgba(248, 250, 252, 0.72);
      text-align: center;
    }

    .footer a {
      color: rgba(248, 250, 252, 0.85);
      text-decoration: underline;
    }

    @media (max-width: 860px) {
      .window-body { padding: 1.8rem 1.6rem 2.3rem; }
      .girl { left: 1.6rem; width: 128px; }
      .speech { left: 160px; width: calc(100% - 190px); }
    }

    @media (max-width: 540px) {
      .girl { display: none; }
      .speech { left: 1.5rem; width: calc(100% - 3rem); }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script crossorigin src="https://unpkg.com/babel-standalone@6.26.0/babel.min.js"></script>

  <script type="text/babel">
    const { useEffect, useState } = React;

    function IntroWindow({ open, onClose }) {
      return (
        <div className={"window " + (open ? 'open' : '')}>
          <div className="window-header">
            <div className="window-title">Varshaa's AI Studio</div>
            <div className="dots">
              <div className="dot" />
              <div className="dot" />
              <div className="dot" />
            </div>
          </div>

          <div className="window-body">
            <button className="close" aria-label="Close" onClick={onClose}>×</button>
            <img
              className="girl"
              src="https://images.unsplash.com/photo-1517841905240-472988babdf9?auto=format&fit=crop&w=250&q=80"
              alt="Animated character"
            />
            <div className="speech">
              <strong>Hi, I'm Varshaa.</strong>
              <span>I am highly interested in AI and love building intelligent systems that solve real problems.</span>
            </div>
          </div>
        </div>
      );
    }

    function App() {
      const [open, setOpen] = useState(false);

      useEffect(() => {
        const timer = setTimeout(() => setOpen(true), 600);
        return () => clearTimeout(timer);
      }, []);

      return (
        <div className="card">
          <h1>
            Varshaa <span>Shree</span>
          </h1>
          <p className="lead">
            AI/ML engineer specializing in LLM systems, RAG pipelines, and agentic AI. Explore the demo window to see a quick animated greeting and learn more about my work.
          </p>

          <a
            className="btn"
            href="https://vstephne.github.io/ai-architecture-demo/"
            target="_blank"
            rel="noopener"
          >
            Open AI Architecture Demo
          </a>

          <IntroWindow open={open} onClose={() => setOpen(false)} />

          <div className="footer">
            Hosted on GitHub Pages • Built with React (CDN) &amp; lightweight CSS animation.
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
